# Monitoring config template. Copy to config.toml and adjust per host.
# install.sh will auto-copy this to config.toml on first run if missing.
# Path-relative entries are resolved against the directory of THIS file.

# Identifier for this host. Shown in dashboard title and /api/health response.
# Set to your hostname (e.g. "gpu-server-01") so cross-host correlation
# can tell which monitor a record came from.
host_id = "<set-per-host>"

db_path = "monitor.db"
stalls_dir = "stalls"
gdb_path = "/usr/bin/gdb"
sudo_path = "/usr/bin/sudo"

[ollama]
container_name = "ollama"
# Path to your docker-compose.yml (relative or absolute).
compose_file = "../docker-compose.yml"

[api]
host = "0.0.0.0"
port = 3002

[gpu]
poll_interval_sec = 10

[process]
poll_interval_sec = 10
heartbeat_sec = 60               # force-write at least every N sec even if no delta

[stall]
poll_interval_sec = 5
vram_min_mib = 1000
util_max_percent = 5
ollama_serve_cpu_min_percent = 50
# Strict criteria: tighter power threshold + N polls in a row.
strict_power_max_watts = 50
strict_consecutive_polls = 6     # 6 * 5s = 30s continuous
# Loose criteria: relaxed power threshold + sliding window.
loose_power_max_watts = 75
loose_window_polls = 6           # window size = 30s
loose_window_match_fraction = 0.8 # 80% of last 30s must match
cooldown_sec = 120
capture_gdb = true
capture_proc_stacks = true

[retention]
days = 30
