services:
  ollama:
    # Pinned image version (not :latest) for controlled updates.
    # Image-Version gepinnt (nicht :latest), fuer kontrollierte Updates.
    image: ollama/ollama:0.17.6

    container_name: ollama
    restart: unless-stopped
    networks: [openllm-net]

    # Bind to host IP(s) from .env. Use BIND_IP=0.0.0.0 for all interfaces.
    # Bindet an Host-IP(s) aus .env. BIND_IP=0.0.0.0 = alle Interfaces.
    ports:
      - "${BIND_IP}:11434:11434"
      - "${BIND_IP_WLAN}:11434:11434"

    # External DNS for reliable resolution of registry.ollama.ai.
    # Externe DNS fuer zuverlaessige Aufloesung von registry.ollama.ai.
    dns:
      - 1.1.1.1
      - 8.8.8.8

    # Persistence path is composable via DATA_ROOT in .env.
    # Persistenzpfad ueber DATA_ROOT in .env konfigurierbar.
    volumes:
      - ${DATA_ROOT}/ollama:/root/.ollama

    environment:
      # ── Scheduling & Queuing ──
      # 1 slot per model saves ~4-8 GB KV-cache; 2 loaded models = chat + embedding for RAG.
      # 1 Slot pro Modell spart ~4-8 GB KV-Cache; 2 Modelle = Chat + Embedding fuer RAG.
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "2"
      # Queue depth: requests wait instead of forcing model unload (default 512).
      # Warteschlange: Requests warten statt Modelle zu entladen (Default 512).
      OLLAMA_MAX_QUEUE: "16"
      # Unload idle models after 10 min (default 5m); buffer for RAG workflows.
      # Idle-Modelle nach 10 Min entladen (Default 5m); Puffer fuer RAG-Workflows.
      OLLAMA_KEEP_ALIVE: "10m"

      # ── Logging ──
      # Debug mode: logs model name, token counts, timings per request.
      # Debug-Modus: loggt Modellname, Token-Counts und Timings pro Request.
      OLLAMA_DEBUG: "1"

      # ── Context & memory ──
      # Long-context test (256k); revert to 32768 if VRAM-tight.
      # Long-Context-Test (256k); auf 32768 zurueck wenn VRAM knapp.
      OLLAMA_CONTEXT_LENGTH: "262144"
      # Flash Attention reduces KV-cache VRAM by ~30-50%.
      # Flash Attention reduziert KV-Cache VRAM um ~30-50%.
      OLLAMA_FLASH_ATTENTION: "1"
      # 2 GiB reserve = conservative, practical.
      # 2 GiB Reserve = konservativ, praxistauglich.
      OLLAMA_GPU_OVERHEAD: "2147483648"

      # ── GPU ──
      # All visible GPUs; Ollama auto-distributes layers if a model exceeds one card.
      # Alle sichtbaren GPUs; Ollama verteilt Layers automatisch wenn Modell zu gross fuer eine.
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

    runtime: nvidia

    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 5s
      retries: 5

  openwebui:
    # Pinned image version (not :latest) for controlled updates.
    # Image-Version gepinnt (nicht :latest), fuer kontrollierte Updates.
    image: ghcr.io/open-webui/open-webui:v0.6.43

    container_name: openwebui
    restart: unless-stopped
    networks: [openllm-net]
    depends_on:
      - ollama

    # External port from .env (default 3000).
    # Externer Port aus .env (Default 3000).
    ports:
      - "${BIND_IP}:${OPENWEBUI_PORT}:8080"

    # Persistence path is composable via DATA_ROOT in .env.
    # Persistenzpfad ueber DATA_ROOT in .env konfigurierbar.
    volumes:
      - ${DATA_ROOT}/openwebui:/app/backend/data

    environment:
      # WebUI talks to ollama internally over the docker network.
      # WebUI spricht intern den ollama-Service ueber Docker-Netz an.
      OLLAMA_BASE_URL: "http://ollama:11434"

networks:
  openllm-net:
    name: openllm-net
