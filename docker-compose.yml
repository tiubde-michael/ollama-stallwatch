services:
  ollama:
    # Abweichung: Version gepinnt (statt :latest), damit Updates kontrolliert sind
    # Alt: ollama/ollama:latest
    # Neu: ollama/ollama:0.17.6 (Update von 0.15.6 für Qwen 3.5 Support)

    image: ollama/ollama:0.17.6

    container_name: ollama
    restart: unless-stopped
    networks: [openllm-net]

    # Abweichung: Ports unverändert wie alt (11434 auf LAN + WLAN IP)
    ports:
      - "${BIND_IP}:11434:11434"
      - "${BIND_IP_WLAN}:11434:11434"

    # Abweichung: DNS-Fix bleibt drin (war bei dir schon ergänzt), damit registry.ollama.ai zuverlässig auflösbar ist
    dns:
      - 1.1.1.1
      - 8.8.8.8

    # Abweichung: Persistenzpfad umgezogen von /opt/ollama -> /srv/Container/ollama
    # Alt: /opt/ollama:/root/.ollama
    # Neu: /srv/Container/ollama:/root/.ollama
    volumes:
      - /srv/Container/ollama:/root/.ollama

    environment:
      # ── Scheduling & Queuing ──
      # Alt: NUM_PARALLEL=3, MAX_LOADED_MODELS=3 (VRAM-Thrashing bei Multi-Client-Zugriff)
      # Neu: 1 Slot pro Modell spart ~4-8 GB KV-Cache; 2 Modelle = Chat + Embedding für RAG
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "2"
      # Warteschlange: Requests warten statt Modelle zu entladen (Default: 512)
      OLLAMA_MAX_QUEUE: "16"
      # Idle-Modelle nach 10 Min entladen (Default: 5m); gibt RAG-Workflows genug Puffer
      OLLAMA_KEEP_ALIVE: "10m"

      # ── Logging ──
      # Debug-Modus: Loggt Modellname, Token-Counts und Timings pro Request
      OLLAMA_DEBUG: "1"

      # ── Context & Speicher ──
      # Kontextfenster bleibt bei 32k
      OLLAMA_CONTEXT_LENGTH: "32768"
      # Flash Attention: reduziert KV-Cache VRAM-Verbrauch um ~30-50%
      OLLAMA_FLASH_ATTENTION: "1"
      # 2 GiB Reserve = konservativ, praxistauglich
      OLLAMA_GPU_OVERHEAD: "2147483648"

      # ── GPU ──
      # Beide GPUs sichtbar (3090 Ti 24 GB + 5060 Ti 16 GB = 40 GB VRAM gesamt)
      # Ollama verteilt Layers automatisch auf beide GPUs wenn ein Modell nicht auf eine passt
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

    # Wie alt: NVIDIA runtime
    runtime: nvidia

    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 5s
      retries: 5

  openwebui:
    # Abweichung: Version gepinnt (statt :latest), damit Updates kontrolliert sind
    # Alt: ghcr.io/open-webui/open-webui:latest
    # Neu: ghcr.io/open-webui/open-webui:v0.6.43
    image: ghcr.io/open-webui/open-webui:v0.6.43

    container_name: openwebui
    restart: unless-stopped
    networks: [openllm-net]
    depends_on:
      - ollama

    # Abweichung: Port per .env steuerbar (Standard 3000 empfohlen)
    # Alt: im Ausschnitt ohne Ports (vermutlich extern anders gelöst oder Default)
    ports:
      - "${BIND_IP}:${OPENWEBUI_PORT}:8080"

    # Abweichung: Persistenzpfad umgezogen nach /srv/Container/openwebui
    volumes:
      - /srv/Container/openwebui:/app/backend/data

    environment:
      # Wie neu-standard: WebUI spricht intern den ollama-Service über Docker-Netz an
      OLLAMA_BASE_URL: "http://ollama:11434"

networks:
  openllm-net:
    name: openllm-net
